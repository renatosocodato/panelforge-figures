name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q --cov=panelforge_figures --cov-report=term-missing
      - name: Catalog sanity
        run: |
          figures catalog --json > /tmp/catalog.json
          python -c "import json, sys; d=json.load(open('/tmp/catalog.json')); n=sum(len(m['recipes']) for m in d['modalities']); print(f'recipes={n}'); assert n >= 18, f'expected >=18, got {n}'"
      - name: Gallery regeneration
        run: |
          figures gallery regenerate
          python -c "from pathlib import Path; pngs=list(Path('docs/gallery').rglob('*.png')); print(f'gallery_pngs={len(pngs)}'); assert len(pngs) >= 18, len(pngs)"
