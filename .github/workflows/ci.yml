name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test (fast suite)
        run: pytest -q -m "not slow" --cov=panelforge_figures --cov-report=term-missing
      - name: Catalog sanity
        run: |
          figures catalog --json > /tmp/catalog.json
          python -c "import json, sys; d=json.load(open('/tmp/catalog.json')); n=sum(len(m['recipes']) for m in d['modalities']); print(f'recipes={n}'); assert n >= 107, f'expected >=107, got {n}'"
      - name: Recipes index drift check
        env:
          # Committed `recipes_index.json` uses stable headers so CI diff
          # is content-only.  Contributors regenerating the index locally
          # MUST set these env vars (or use `figures index emit`, which
          # sets them automatically when writing to repo root).
          PANELFORGE_BUILT_AT: "1970-01-01T00:00:00Z"
          PANELFORGE_GIT_COMMIT: "committed"
        run: |
          figures index emit
          if ! git diff --exit-code recipes_index.json; then
            echo "❌ recipes_index.json is stale. Regenerate via 'figures index emit' and commit." >&2
            exit 1
          fi
          figures index validate
      - name: Gallery regeneration
        run: |
          figures gallery regenerate
          python -c "from pathlib import Path; pngs=list(Path('docs/gallery').rglob('*.png')); print(f'gallery_pngs={len(pngs)}'); assert len(pngs) >= 107, len(pngs)"
