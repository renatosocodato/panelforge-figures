repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.lock$|recipes_index\.json$|tests/.*'
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      # NOTE: ruff-format is intentionally NOT enabled. The project gate is the
      # linter (`ruff check`) only; CI does not run `ruff format`, and the tree
      # is not format-normalized, so a format hook would create noisy diffs.
      # See CONTRIBUTING.md section 3.
