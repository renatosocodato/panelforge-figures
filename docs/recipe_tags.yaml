# docs/recipe_tags.yaml
#
# Manual tag overrides for recipes the auto-tagger cannot tag with high
# confidence. Keys are "{modality}.{name}" (matching the registry's
# full_name). Values are partial tag dicts; auto-tagger derives the
# remainder.
#
# Sorted by key. CI asserts bidirectional consistency vs the registry
# (no orphans, no missing recipes).
#
# Coverage:
# - Tier 1: all 25 recipes from v1.5.0-beta-cdc42_factorial_companion (anchor: CDC42, factorial: true)
# - Tier 1: all 31 recipes from v1.4.0-beta-disc1_manuscript_companion (anchor: DISC1)
# - Tier 2: remaining biophysics_scaling recipes (anchor: generic, scale_aware: true)
# - Tier 2: full coverage of actin_microtubule_morphometry, intravital_imaging,
#   meta_and_diagnostic, omics_differential, mixed_effects_models
# - Tier 2: full coverage of grant_and_conceptual, spatial_statistics,
#   clinical_cohort, dose_response_pharmacology, network_and_pathway,
#   sensitivity_analysis

