# Graphical abstract — freeform layout with 4 panels at custom bboxes.
#
# This fixture exercises the FreeformLayout path: each panel must
# declare its own [x, y, w, h] in figure-relative coordinates.
figure_id: freeform_graphical_abstract
title: "Graphical abstract — DISC1 multi-modal summary"

layout:
  type: freeform

shared_aesthetic: meta_and_diagnostic
panel_label_style: none
figsize: [9.0, 6.0]

panels:
  - id: A
    recipe: meta_and_diagnostic.bayes_factor_arrow_plot
    caption: "Bayesian evidence"
    freeform_bbox: [0.05, 0.55, 0.42, 0.40]
  - id: B
    recipe: actin_microtubule_morphometry.behavioral_fingerprint_trio_composite
    caption: "Morphometric fingerprint"
    freeform_bbox: [0.55, 0.55, 0.40, 0.40]
  - id: C
    recipe: omics_differential.module_concordance_signed_heatmap
    caption: "Module concordance"
    freeform_bbox: [0.05, 0.07, 0.42, 0.42]
  - id: D
    recipe: mixed_effects_models.two_way_anova_summary_plot
    caption: "Two-way ANOVA"
    freeform_bbox: [0.55, 0.07, 0.40, 0.42]
